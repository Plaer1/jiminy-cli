name: 'Release: Nightly'

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run a dry-run of the release process; no branches, npm packages or GitHub releases will be created.'
        required: true
        type: 'boolean'
        default: true
      force_skip_tests:
        description: 'Select to skip the "Run Tests" step in testing. Prod releases should run tests'
        required: false
        type: 'boolean'
        default: true
      ref:
        description: 'The branch, tag, or SHA to release from.'
        required: false
        type: 'string'
        default: 'main'
      environment:
        description: 'Environment'
        required: false
        type: 'choice'
        options:
          - 'prod'
          - 'dev'
        default: 'prod'

jobs:
  prepare-release:
    if: "github.repository == 'Plaer1/jiminy-cli'"
    environment: "${{ github.event.inputs.environment || 'prod' }}"
    runs-on: 'ubuntu-latest'
    outputs:
      dry_run: "${{ github.event_name == 'schedule' && 'false' || github.event.inputs.dry_run }}"
      release_branch: '${{ steps.publish_release.outputs.release-branch }}'
      release_tag: '${{ steps.nightly_version.outputs.RELEASE_TAG }}'
      release_version: '${{ steps.nightly_version.outputs.RELEASE_VERSION }}'
      release_channel: '${{ steps.nightly_version.outputs.RELEASE_CHANNEL }}'
      previous_tag: '${{ steps.nightly_version.outputs.PREVIOUS_TAG }}'
    permissions:
      contents: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8'
        with:
          ref: "${{ github.event.inputs.ref || 'main' }}"
          fetch-depth: 0

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4
        with:
          node-version-file: './.nvmrc'
          cache: 'npm'

      - name: 'Install Dependencies'
        run: 'npm ci'

      - name: 'Run Tests'
        if: "${{ github.event_name == 'schedule' || github.event.inputs.force_skip_tests == 'false' }}"
        uses: './.github/actions/run-tests'
        with:
          jiminy_api_key: '${{ secrets.GEMINI_API_KEY }}'
          working-directory: '.'

      - name: 'Get Nightly Version'
        id: 'nightly_version'
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          # Calculate the version using the centralized script
          VERSION_JSON=$(node scripts/get-release-version.js --type=nightly)

          # Extract values for logging and outputs
          RELEASE_TAG=$(echo "${VERSION_JSON}" | jq -r .releaseTag)
          RELEASE_VERSION=$(echo "${VERSION_JSON}" | jq -r .releaseVersion)
          RELEASE_CHANNEL=$(echo "${VERSION_JSON}" | jq -r .npmTag)
          PREVIOUS_TAG=$(echo "${VERSION_JSON}" | jq -r .previousReleaseTag)

          # Print calculated values for logging
          echo "Calculated Release Tag: ${RELEASE_TAG}"
          echo "Calculated Release Version: ${RELEASE_VERSION}"
          echo "Calculated Previous Tag: ${PREVIOUS_TAG}"

          # Set outputs for subsequent steps
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "RELEASE_CHANNEL=${RELEASE_CHANNEL}" >> "${GITHUB_OUTPUT}"
          echo "PREVIOUS_TAG=${PREVIOUS_TAG}" >> "${GITHUB_OUTPUT}"

      - name: 'Prepare Release Branch And Bundle'
        id: 'publish_release'
        uses: './.github/actions/publish-release'
        with:
          release-version: '${{ steps.nightly_version.outputs.RELEASE_VERSION }}'
          release-tag: '${{ steps.nightly_version.outputs.RELEASE_TAG }}'
          release-channel: '${{ steps.nightly_version.outputs.RELEASE_CHANNEL }}'
          npm-tag: '${{ steps.nightly_version.outputs.RELEASE_CHANNEL }}'
          dry-run: "${{ github.event_name == 'schedule' && 'false' || github.event.inputs.dry_run }}"
          publish-npm: 'true'
          github-token: '${{ secrets.GEMINI_CLI_ROBOT_GITHUB_PAT || secrets.GITHUB_TOKEN }}'
          wombat-token-core: '${{ secrets.WOMBAT_TOKEN_CORE }}'
          wombat-token-cli: '${{ secrets.WOMBAT_TOKEN_CLI }}'
          wombat-token-a2a-server: '${{ secrets.WOMBAT_TOKEN_A2A_SERVER }}'
          force-skip-tests: '${{ github.event.inputs.force_skip_tests }}'
          jiminy_api_key: '${{ secrets.GEMINI_API_KEY }}'
          previous-tag: '${{ steps.nightly_version.outputs.PREVIOUS_TAG }}'
          npm-registry-url: '${{ vars.NPM_REGISTRY_URL }}'
          npm-registry-scope: '${{ vars.NPM_REGISTRY_SCOPE }}'
          cli-package-name: '${{ vars.CLI_PACKAGE_NAME }}'
          core-package-name: '${{ vars.CORE_PACKAGE_NAME }}'
          a2a-package-name: '${{ vars.A2A_PACKAGE_NAME }}'
          working-directory: '.'

  build-binaries:
    if: "github.repository == 'Plaer1/jiminy-cli'"
    needs: 'prepare-release'
    runs-on: '${{ matrix.os }}'
    permissions:
      contents: 'read'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: 'ubuntu-latest'
            platform_name: 'linux-x64'
            arch: 'x64'
          - os: 'windows-latest'
            platform_name: 'win32-x64'
            arch: 'x64'
          - os: 'macos-latest'
            platform_name: 'darwin-arm64'
            arch: 'arm64'
          - os: 'macos-latest'
            platform_name: 'darwin-x64'
            arch: 'x64'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8'
        with:
          ref: "${{ needs.prepare-release.outputs.dry_run == 'true' && (github.event.inputs.ref || 'main') || needs.prepare-release.outputs.release_branch }}"
          fetch-depth: 0

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          architecture: '${{ matrix.arch }}'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci'

      - name: 'Apply release version in dry run mode'
        if: "${{ needs.prepare-release.outputs.dry_run == 'true' }}"
        run: 'npm run release:version "${{ needs.prepare-release.outputs.release_version }}"'

      - name: 'Build Binary'
        run: 'npm run build:binary'

      - name: 'Smoke Test Binary'
        run: |
          if [ -f "dist/${{ matrix.platform_name }}/jiminy.exe" ]; then
            "./dist/${{ matrix.platform_name }}/jiminy.exe" --version
          else
            "./dist/${{ matrix.platform_name }}/jiminy" --version
          fi

      - name: 'Package Artifact (Windows)'
        if: "matrix.os == 'windows-latest'"
        shell: 'powershell'
        run: |
          Compress-Archive -Path "dist/${{ matrix.platform_name }}/*" -DestinationPath "jiminy-cli-${{ matrix.platform_name }}.zip" -Force

      - name: 'Package Artifact (Unix)'
        if: "matrix.os != 'windows-latest'"
        run: |
          cd "dist/${{ matrix.platform_name }}"
          zip -r "../../jiminy-cli-${{ matrix.platform_name }}.zip" .

      - name: 'Upload Artifact'
        uses: 'actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02' # ratchet:actions/upload-artifact@v4
        with:
          name: 'jiminy-cli-${{ matrix.platform_name }}'
          path: 'jiminy-cli-${{ matrix.platform_name }}.zip'
          retention-days: 5

  publish-release:
    if: "${{ github.repository == 'Plaer1/jiminy-cli' && needs.prepare-release.outputs.dry_run != 'true' && needs.prepare-release.outputs.release_channel != 'dev' }}"
    needs:
      - 'prepare-release'
      - 'build-binaries'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'write'
    steps:
      - name: 'Download Bundle Artifact'
        uses: 'actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806' # ratchet:actions/download-artifact@v4
        with:
          name: 'jiminy-cli-bundle'
          path: 'release-assets/bundle'

      - name: 'Download Linux Binary Artifact'
        uses: 'actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806' # ratchet:actions/download-artifact@v4
        with:
          name: 'jiminy-cli-linux-x64'
          path: 'release-assets/linux-x64'

      - name: 'Download Windows Binary Artifact'
        uses: 'actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806' # ratchet:actions/download-artifact@v4
        with:
          name: 'jiminy-cli-win32-x64'
          path: 'release-assets/win32-x64'

      - name: 'Download macOS ARM Binary Artifact'
        uses: 'actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806' # ratchet:actions/download-artifact@v4
        with:
          name: 'jiminy-cli-darwin-arm64'
          path: 'release-assets/darwin-arm64'

      - name: 'Download macOS x64 Binary Artifact'
        uses: 'actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806' # ratchet:actions/download-artifact@v4
        with:
          name: 'jiminy-cli-darwin-x64'
          path: 'release-assets/darwin-x64'

      - name: 'Create GitHub Release'
        env:
          GH_TOKEN: '${{ secrets.GEMINI_CLI_ROBOT_GITHUB_PAT || secrets.GITHUB_TOKEN }}'
        run: |
          gh release create "${{ needs.prepare-release.outputs.release_tag }}" \
            release-assets/bundle/jiminy-cli-bundle.zip \
            release-assets/linux-x64/jiminy-cli-linux-x64.zip \
            release-assets/win32-x64/jiminy-cli-win32-x64.zip \
            release-assets/darwin-arm64/jiminy-cli-darwin-arm64.zip \
            release-assets/darwin-x64/jiminy-cli-darwin-x64.zip \
            --target "${{ needs.prepare-release.outputs.release_branch }}" \
            --title "Release ${{ needs.prepare-release.outputs.release_tag }}" \
            --notes-start-tag "${{ needs.prepare-release.outputs.previous_tag }}" \
            --generate-notes \
            ${{ needs.prepare-release.outputs.release_channel != 'latest' && '--prerelease' || '' }}

      - name: 'Checkout'
        if: "${{ github.event.inputs.environment != 'dev' && needs.prepare-release.outputs.dry_run != 'true' }}"
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8'

      - name: 'Create and Merge Pull Request'
        if: "${{ github.event.inputs.environment != 'dev' && needs.prepare-release.outputs.dry_run != 'true' }}"
        uses: './.github/actions/create-pull-request'
        with:
          branch-name: '${{ needs.prepare-release.outputs.release_branch }}'
          pr-title: 'chore/release: bump version to ${{ needs.prepare-release.outputs.release_version }}'
          pr-body: 'Automated version bump for nightly release.'
          github-token: '${{ secrets.GEMINI_CLI_ROBOT_GITHUB_PAT }}'
          dry-run: '${{ needs.prepare-release.outputs.dry_run }}'
          working-directory: '.'

      - name: 'Create Issue on Failure'
        if: "${{ failure() && github.event.inputs.environment != 'dev' && needs.prepare-release.outputs.dry_run != 'true' }}"
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          RELEASE_TAG: '${{ needs.prepare-release.outputs.release_tag }}'
          DETAILS_URL: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
        run: |
          gh issue create \
            --title "Nightly Release Failed for ${RELEASE_TAG} on $(date +'%Y-%m-%d')" \
            --body "The nightly-release workflow failed. See the full run for details: ${DETAILS_URL}" \
            --label 'release-failure,priority/p0'
