name: 'Release: Manual'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The version to release (e.g., v0.1.11). Must be a valid semver string with a "v" prefix.'
        required: true
        type: 'string'
      ref:
        description: 'The branch, tag, or SHA to release from.'
        required: true
        type: 'string'
      release_channel:
        description: 'The release channel'
        required: true
        type: 'choice'
        options:
          - 'dev'
          - 'preview'
          - 'nightly'
          - 'latest'
        default: 'latest'
      dry_run:
        description: 'Run a dry-run of the release process; no branches, npm packages or GitHub releases will be created.'
        required: true
        type: 'boolean'
        default: true
      force_skip_tests:
        description: 'Select to skip the "Run Tests" step in testing. Prod releases should run tests'
        required: false
        type: 'boolean'
        default: false
      skip_github_release:
        description: 'Select to skip creating a GitHub release (only used when environment is PROD)'
        required: false
        type: 'boolean'
        default: false
      environment:
        description: 'Environment'
        required: false
        type: 'choice'
        options:
          - 'prod'
          - 'dev'
        default: 'prod'

jobs:
  prepare-release:
    if: "github.repository == 'Plaer1/jiminy-cli'"
    runs-on: 'ubuntu-latest'
    environment: "${{ github.event.inputs.environment || 'prod' }}"
    outputs:
      release_branch: '${{ steps.publish_release.outputs.release-branch }}'
      release_tag: '${{ github.event.inputs.version }}'
      release_version: '${{ steps.release_info.outputs.RELEASE_VERSION }}'
      release_channel: '${{ github.event.inputs.release_channel }}'
      previous_tag: '${{ steps.release_info.outputs.PREVIOUS_TAG }}'
    permissions:
      contents: 'write'
      issues: 'write'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8'
        with:
          ref: '${{ github.event.inputs.ref }}'
          fetch-depth: 0

      - name: 'Debug Inputs'
        shell: 'bash'
        env:
          JSON_INPUTS: '${{ toJSON(inputs) }}'
        run: 'echo "$JSON_INPUTS"'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020'
        with:
          node-version-file: './.nvmrc'
          cache: 'npm'

      - name: 'Install Dependencies'
        run: 'npm ci'

      - name: 'Prepare Release Info'
        id: 'release_info'
        env:
          INPUT_VERSION: '${{ github.event.inputs.version }}'
        run: |
          RELEASE_VERSION="${INPUT_VERSION}"
          echo "RELEASE_VERSION=${RELEASE_VERSION#v}" >> "${GITHUB_OUTPUT}"
          echo "PREVIOUS_TAG=$(git describe --tags --abbrev=0)" >> "${GITHUB_OUTPUT}"

      - name: 'Run Tests'
        if: "${{github.event.inputs.force_skip_tests != 'true'}}"
        uses: './.github/actions/run-tests'
        with:
          jiminy_api_key: '${{ secrets.GEMINI_API_KEY }}'
          working-directory: '.'

      - name: 'Prepare Release Branch And Bundle'
        id: 'publish_release'
        uses: './.github/actions/publish-release'
        with:
          release-version: '${{ steps.release_info.outputs.RELEASE_VERSION }}'
          release-tag: '${{ github.event.inputs.version }}'
          release-channel: '${{ github.event.inputs.release_channel }}'
          dry-run: '${{ github.event.inputs.dry_run }}'
          working-directory: '.'

  build-binaries:
    if: "github.repository == 'Plaer1/jiminy-cli'"
    needs: 'prepare-release'
    runs-on: '${{ matrix.os }}'
    permissions:
      contents: 'read'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: 'ubuntu-latest'
            platform_name: 'linux-x64'
            arch: 'x64'
          - os: 'windows-latest'
            platform_name: 'win32-x64'
            arch: 'x64'
          - os: 'macos-latest'
            platform_name: 'darwin-arm64'
            arch: 'arm64'
          - os: 'macos-latest'
            platform_name: 'darwin-x64'
            arch: 'x64'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8'
        with:
          ref: "${{ github.event.inputs.dry_run == 'true' && github.event.inputs.ref || needs.prepare-release.outputs.release_branch }}"
          fetch-depth: 0

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020'
        with:
          node-version-file: '.nvmrc'
          architecture: '${{ matrix.arch }}'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci'

      - name: 'Apply release version in dry run mode'
        if: "${{ github.event.inputs.dry_run == 'true' }}"
        run: 'npm run release:version "${{ needs.prepare-release.outputs.release_version }}"'

      - name: 'Build Binary'
        run: 'npm run build:binary'

      - name: 'Smoke Test Binary'
        run: |
          if [ -f "dist/${{ matrix.platform_name }}/jiminy.exe" ]; then
            "./dist/${{ matrix.platform_name }}/jiminy.exe" --version
          else
            "./dist/${{ matrix.platform_name }}/jiminy" --version
          fi

      - name: 'Package Artifact (Windows)'
        if: "matrix.os == 'windows-latest'"
        shell: 'powershell'
        run: |
          Compress-Archive -Path "dist/${{ matrix.platform_name }}/*" -DestinationPath "jiminy-cli-${{ matrix.platform_name }}.zip" -Force

      - name: 'Package Artifact (Unix)'
        if: "matrix.os != 'windows-latest'"
        run: |
          cd "dist/${{ matrix.platform_name }}"
          zip -r "../../jiminy-cli-${{ matrix.platform_name }}.zip" .

      - name: 'Upload Artifact'
        uses: 'actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02' # ratchet:actions/upload-artifact@v4
        with:
          name: 'jiminy-cli-${{ matrix.platform_name }}'
          path: 'jiminy-cli-${{ matrix.platform_name }}.zip'
          retention-days: 5

  publish-release:
    if: "${{ github.repository == 'Plaer1/jiminy-cli' && github.event.inputs.dry_run != 'true' && github.event.inputs.skip_github_release != 'true' && needs.prepare-release.outputs.release_channel != 'dev' }}"
    needs:
      - 'prepare-release'
      - 'build-binaries'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'write'
    steps:
      - name: 'Download Bundle Artifact'
        uses: 'actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806' # ratchet:actions/download-artifact@v4
        with:
          name: 'jiminy-cli-bundle'
          path: 'release-assets/bundle'

      - name: 'Download Linux Binary Artifact'
        uses: 'actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806' # ratchet:actions/download-artifact@v4
        with:
          name: 'jiminy-cli-linux-x64'
          path: 'release-assets/linux-x64'

      - name: 'Download Windows Binary Artifact'
        uses: 'actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806' # ratchet:actions/download-artifact@v4
        with:
          name: 'jiminy-cli-win32-x64'
          path: 'release-assets/win32-x64'

      - name: 'Download macOS ARM Binary Artifact'
        uses: 'actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806' # ratchet:actions/download-artifact@v4
        with:
          name: 'jiminy-cli-darwin-arm64'
          path: 'release-assets/darwin-arm64'

      - name: 'Download macOS x64 Binary Artifact'
        uses: 'actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806' # ratchet:actions/download-artifact@v4
        with:
          name: 'jiminy-cli-darwin-x64'
          path: 'release-assets/darwin-x64'

      - name: 'Create GitHub Release'
        env:
          GH_TOKEN: '${{ secrets.GEMINI_CLI_ROBOT_GITHUB_PAT || secrets.GITHUB_TOKEN }}'
        run: |
          gh release create "${{ needs.prepare-release.outputs.release_tag }}" \
            release-assets/bundle/jiminy-cli-bundle.zip \
            release-assets/linux-x64/jiminy-cli-linux-x64.zip \
            release-assets/win32-x64/jiminy-cli-win32-x64.zip \
            release-assets/darwin-arm64/jiminy-cli-darwin-arm64.zip \
            release-assets/darwin-x64/jiminy-cli-darwin-x64.zip \
            --target "${{ needs.prepare-release.outputs.release_branch }}" \
            --title "Release ${{ needs.prepare-release.outputs.release_tag }}" \
            --notes-start-tag "${{ needs.prepare-release.outputs.previous_tag }}" \
            --generate-notes \
            ${{ needs.prepare-release.outputs.release_channel != 'latest' && '--prerelease' || '' }}

      - name: 'Create Issue on Failure'
        if: "${{ failure() && github.event.inputs.dry_run != 'true' }}"
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          RELEASE_TAG: '${{ github.event.inputs.version }}'
          DETAILS_URL: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
        run: |
          gh issue create \
            --title 'Manual Release Failed for ${RELEASE_TAG} on $(date +'%Y-%m-%d')' \
            --body 'The manual release workflow failed. See the full run for details: ${DETAILS_URL}' \
            --label 'release-failure,priority/p0'
