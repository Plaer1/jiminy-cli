name: 'Trigger Docs Rebuild'
on:
  workflow_dispatch:
jobs:
  trigger-rebuild:
    if: "${{ github.repository == 'Plaer1/jiminy-cli' && secrets.DOCS_REBUILD_URL != '' }}"
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Trigger rebuild'
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.DOCS_REBUILD_URL }}"
