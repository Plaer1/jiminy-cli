name: 'Publish Release'
description: 'Prepares a Jiminy release branch and uploads the GitHub release bundle artifact.'

inputs:
  release-version:
    description: 'The version to release (e.g., 0.1.11).'
    required: true
  release-channel:
    description: 'The release channel (e.g., latest, preview, nightly, dev).'
    required: true
  dry-run:
    description: 'Whether to run in dry-run mode.'
    type: 'string'
    required: true
  release-tag:
    description: 'The release tag for the release (e.g., v0.1.11).'
    required: true
  working-directory:
    description: 'The working directory to run the steps in.'
    required: false
    default: '.'
outputs:
  release-branch:
    description: 'The created release branch name.'
    value: '${{ steps.release_branch.outputs.branch_name }}'
runs:
  using: 'composite'
  steps:
    - name: '📝 Print Inputs'
      shell: 'bash'
      env:
        JSON_INPUTS: '${{ toJSON(inputs) }}'
      run: 'echo "$JSON_INPUTS"'

    - name: '👤 Configure Git User'
      working-directory: '${{ inputs.working-directory }}'
      shell: 'bash'
      run: |
        git config user.name "jiminy-cli-robot"
        git config user.email "jiminy-cli-robot@users.noreply.github.com"

    - name: '🌿 Create and switch to a release branch'
      working-directory: '${{ inputs.working-directory }}'
      id: 'release_branch'
      shell: 'bash'
      run: |
        BRANCH_NAME="release/${INPUTS_RELEASE_TAG}"
        git switch -c "${BRANCH_NAME}"
        echo "branch_name=${BRANCH_NAME}" >> "${GITHUB_OUTPUT}"
      env:
        INPUTS_RELEASE_TAG: '${{ inputs.release-tag }}'

    - name: '⬆️ Update package versions'
      working-directory: '${{ inputs.working-directory }}'
      shell: 'bash'
      run: |
        npm run release:version "${INPUTS_RELEASE_VERSION}"
      env:
        INPUTS_RELEASE_VERSION: '${{ inputs.release-version }}'

    - name: '💾 Commit and Conditionally Push package versions'
      working-directory: '${{ inputs.working-directory }}'
      shell: 'bash'
      env:
        BRANCH_NAME: '${{ steps.release_branch.outputs.branch_name }}'
        DRY_RUN: '${{ inputs.dry-run }}'
        RELEASE_TAG: '${{ inputs.release-tag }}'
      run: |-
        set -e
        git add package.json package-lock.json packages/*/package.json
        if ! git diff --cached --quiet; then
          git commit -m "chore(release): ${RELEASE_TAG}"
        fi
        if [[ "${DRY_RUN}" == "false" ]]; then
          echo "Pushing release branch to remote..."
          git push --set-upstream origin "${BRANCH_NAME}"
        else
          echo "Dry run enabled. Skipping push."
        fi

    - name: '🛠️ Build Packages'
      working-directory: '${{ inputs.working-directory }}'
      shell: 'bash'
      run: |
        npm run build:packages

    - name: '🎁 Bundle'
      working-directory: '${{ inputs.working-directory }}'
      shell: 'bash'
      run: |
        npm run bundle

    - name: '📦 Package Jiminy bundle artifact'
      working-directory: '${{ inputs.working-directory }}'
      shell: 'bash'
      run: |
        rm -rf release-bundle-stage jiminy-cli-bundle.zip
        cp -R bundle release-bundle-stage
        if [[ -f release-bundle-stage/jiminy.js ]]; then
          mv release-bundle-stage/jiminy.js release-bundle-stage/jiminy.js
        fi
        if [[ -f release-bundle-stage/jiminy.js.map ]]; then
          mv release-bundle-stage/jiminy.js.map release-bundle-stage/jiminy.js.map
        fi

        if [[ ! -f release-bundle-stage/jiminy.js ]]; then
          echo "Error: release-bundle-stage/jiminy.js was not created."
          exit 1
        fi

        chmod +x release-bundle-stage/jiminy.js
        BUNDLE_VERSION=$(node release-bundle-stage/jiminy.js --version | xargs)
        echo "Bundle version output: ${BUNDLE_VERSION}"
        if [[ -z "${BUNDLE_VERSION}" ]]; then
          echo "Error: Bundle failed to execute or return version."
          exit 1
        fi

        (cd release-bundle-stage && zip -r ../jiminy-cli-bundle.zip .)
        rm -rf release-bundle-stage

    - name: '⬆️ Upload bundle artifact'
      uses: 'actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02' # ratchet:actions/upload-artifact@v4
      with:
        name: 'jiminy-cli-bundle'
        path: '${{ inputs.working-directory }}/jiminy-cli-bundle.zip'
        retention-days: 5
