# Policy for Memory Manager Agent
# Allows the save_memory agent to manage memories in the ~/.jiminy/ folder.

[[rule]]
subagent = "save_memory"
toolName = ["read_file", "write_file", "replace", "list_directory", "glob", "grep_search"]
decision = "allow"
priority = 100
argsPattern = "(^|.*/)\\.jiminy/.*"
denyMessage = "Memory Manager is only allowed to access the .jiminy folder."
